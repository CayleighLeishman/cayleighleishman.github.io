    <article class="blog-card">

            <h2>Send a Message</h2>
            <form action="https://formsubmit.co/cayleigh.leishman@gmail.com" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" name="name" placeholder="Your Name" required style="padding: 10px; border: 1px solid var(--border-light); border-radius: 4px;">
                <input type="email" name="email" placeholder="Your Email" required style="padding: 10px; border: 1px solid var(--border-light); border-radius: 4px;">
                <textarea name="message" placeholder="How can I help?" rows="4" style="padding: 10px; border: 1px solid var(--border-light); border-radius: 4px;"></textarea>
                <button type="submit" style="background: var(--brand-blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;">Send Message</button>
            </form>
        </div>
